<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css"><style>
body{margin:0;font-family:var(--font-sans);background:var(--bg-page);padding:24px}
.row{display:flex;gap:24px;align-items:center}
.item{display:flex;flex-direction:column;align-items:center;gap:10px}
.box{width:96px;height:64px;background:#fff;border-radius:var(--radius-lg);border:1px solid var(--border-subtle)}
.k{font-family:var(--font-mono);font-size:10px;color:var(--text-subtle)}
</style></head><body>
<div class="row">
<div class="item"><div class="box" style="box-shadow:var(--shadow-xs)"></div><span class="k">xs</span></div>
<div class="item"><div class="box" style="box-shadow:var(--shadow-sm)"></div><span class="k">sm</span></div>
<div class="item"><div class="box" style="box-shadow:var(--shadow-md)"></div><span class="k">md</span></div>
<div class="item"><div class="box" style="box-shadow:var(--shadow-lg)"></div><span class="k">lg</span></div>
<div class="item"><div class="box" style="box-shadow:var(--shadow-xl)"></div><span class="k">xl</span></div>
</div>
</body></html>
