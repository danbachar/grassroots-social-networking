<!-- @dsCard group="Brand" viewport="700x200" name="Voice & tone" subtitle="Warm, plain-spoken, collective. We say 'we' and 'you'." -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css"><style>
body{margin:0;font-family:var(--font-sans);background:var(--bg-page);padding:20px 24px;color:var(--text-body)}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.card{background:#fff;border:1px solid var(--border-subtle);border-radius:var(--radius-lg);padding:14px 16px}
.tag{font-size:11px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;margin-bottom:6px}
.do .tag{color:var(--success)}.dont .tag{color:var(--danger)}
.q{font-size:15px;line-height:1.5;color:var(--text-strong)}
.dont .q{color:var(--text-muted)}
</style></head><body>
<div class="grid">
<div class="card do"><div class="tag">We say</div><div class="q">"Your message is on its way — three neighbours are carrying it now."</div></div>
<div class="card dont"><div class="tag">Not</div><div class="q">"Packet successfully enqueued for multi-hop transmission."</div></div>
<div class="card do"><div class="tag">We say</div><div class="q">"Lend your link. Someone nearby is offline."</div></div>
<div class="card dont"><div class="tag">Not</div><div class="q">"Enable relay mode to maximise network throughput."</div></div>
</div>
</body></html>
