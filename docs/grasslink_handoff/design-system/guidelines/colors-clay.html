<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css"><style>
body{margin:0;font-family:var(--font-sans);background:var(--bg-page);padding:16px}
.row{display:flex;gap:0;border-radius:var(--radius-md);overflow:hidden;box-shadow:var(--shadow-sm)}
.sw{flex:1;height:96px;display:flex;flex-direction:column;justify-content:flex-end;padding:8px;border-right:1px solid rgba(0,0,0,.03)}
.n{font-size:11px;font-weight:600;color:#fff;opacity:.95}
.dk .n{color:var(--clay-900)}
</style></head><body>
<div class="row">
<div class="sw dk" style="background:var(--clay-50)"><span class="n">50 ·bg</span></div>
<div class="sw dk" style="background:var(--clay-100)"><span class="n">100</span></div>
<div class="sw dk" style="background:var(--clay-200)"><span class="n">200</span></div>
<div class="sw dk" style="background:var(--clay-300)"><span class="n">300</span></div>
<div class="sw dk" style="background:var(--clay-400)"><span class="n">400</span></div>
<div class="sw" style="background:var(--clay-500)"><span class="n">500</span></div>
<div class="sw" style="background:var(--clay-600)"><span class="n">600 ·muted</span></div>
<div class="sw" style="background:var(--clay-700)"><span class="n">700</span></div>
<div class="sw" style="background:var(--clay-800)"><span class="n">800 ·body</span></div>
<div class="sw" style="background:var(--clay-900)"><span class="n">900 ·strong</span></div>
</div>
</body></html>
