<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css"><style>
body{margin:0;font-family:var(--font-sans);background:var(--bg-page);padding:16px}
.row{display:flex;gap:0;border-radius:var(--radius-md);overflow:hidden;box-shadow:var(--shadow-sm)}
.sw{flex:1;height:96px;display:flex;flex-direction:column;justify-content:flex-end;padding:8px}
.n{font-size:11px;font-weight:600;color:#fff;opacity:.9}
.h{font-size:10px;color:#fff;opacity:.7;font-family:var(--font-mono)}
.dk .n,.dk .h{color:var(--clay-900)}
</style></head><body>
<div class="row">
<div class="sw dk" style="background:var(--moss-50)"><span class="n">50</span></div>
<div class="sw dk" style="background:var(--moss-100)"><span class="n">100</span></div>
<div class="sw dk" style="background:var(--moss-200)"><span class="n">200</span></div>
<div class="sw dk" style="background:var(--moss-300)"><span class="n">300</span></div>
<div class="sw" style="background:var(--moss-400)"><span class="n">400</span></div>
<div class="sw" style="background:var(--moss-500)"><span class="n">500 ·primary</span><span class="h">#6B7B37</span></div>
<div class="sw" style="background:var(--moss-600)"><span class="n">600</span></div>
<div class="sw" style="background:var(--moss-700)"><span class="n">700</span></div>
<div class="sw" style="background:var(--moss-800)"><span class="n">800</span></div>
<div class="sw" style="background:var(--moss-900)"><span class="n">900</span></div>
</div>
</body></html>
