<!-- @dsCard group="Colors" viewport="700x150" name="Semantic" subtitle="Success, warning, danger, info — with soft companions." -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css"><style>
body{margin:0;font-family:var(--font-sans);background:var(--bg-page);padding:16px}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.item{border-radius:var(--radius-md);overflow:hidden;box-shadow:var(--shadow-sm);background:#fff}
.solid{height:56px;display:flex;align-items:flex-end;padding:8px}
.lbl{color:#fff;font-size:12px;font-weight:600}
.soft{height:32px;display:flex;align-items:center;padding:8px;font-size:11px;font-weight:600}
</style></head><body>
<div class="grid">
<div class="item"><div class="solid" style="background:var(--success)"><span class="lbl">Success</span></div><div class="soft" style="background:var(--success-soft);color:var(--moss-700)">soft</div></div>
<div class="item"><div class="solid" style="background:var(--warning)"><span class="lbl">Warning</span></div><div class="soft" style="background:var(--warning-soft);color:var(--clay-800)">soft</div></div>
<div class="item"><div class="solid" style="background:var(--danger)"><span class="lbl">Danger</span></div><div class="soft" style="background:var(--danger-soft);color:var(--rust-500)">soft</div></div>
<div class="item"><div class="solid" style="background:var(--info)"><span class="lbl">Info</span></div><div class="soft" style="background:var(--info-soft);color:var(--sky-500)">soft</div></div>
</div>
</body></html>
