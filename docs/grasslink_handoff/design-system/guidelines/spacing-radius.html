<!-- @dsCard group="Spacing" viewport="700x150" name="Radius scale" subtitle="Generously rounded, organic corners — xs → pill." -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css"><style>
body{margin:0;font-family:var(--font-sans);background:var(--bg-page);padding:16px 24px}
.row{display:flex;align-items:center;gap:18px;flex-wrap:wrap}
.item{display:flex;flex-direction:column;align-items:center;gap:8px}
.box{width:64px;height:64px;background:var(--moss-100);border:1.5px solid var(--moss-300)}
.k{font-family:var(--font-mono);font-size:10px;color:var(--text-subtle)}
</style></head><body>
<div class="row">
<div class="item"><div class="box" style="border-radius:var(--radius-xs)"></div><span class="k">xs·6</span></div>
<div class="item"><div class="box" style="border-radius:var(--radius-sm)"></div><span class="k">sm·10</span></div>
<div class="item"><div class="box" style="border-radius:var(--radius-md)"></div><span class="k">md·14</span></div>
<div class="item"><div class="box" style="border-radius:var(--radius-lg)"></div><span class="k">lg·20</span></div>
<div class="item"><div class="box" style="border-radius:var(--radius-xl)"></div><span class="k">xl·28</span></div>
<div class="item"><div class="box" style="border-radius:var(--radius-2xl)"></div><span class="k">2xl·36</span></div>
<div class="item"><div class="box" style="border-radius:var(--radius-pill)"></div><span class="k">pill</span></div>
</div>
</body></html>
