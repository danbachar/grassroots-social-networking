<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css"><style>
body{margin:0;font-family:var(--font-sans);background:var(--bg-page);padding:16px 24px}
.row{display:flex;align-items:flex-end;gap:16px}
.item{display:flex;flex-direction:column;align-items:center;gap:6px}
.box{background:var(--terra-300);border-radius:4px}
.k{font-family:var(--font-mono);font-size:10px;color:var(--text-subtle)}
</style></head><body>
<div class="row">
<div class="item"><div class="box" style="width:4px;height:4px"></div><span class="k">1·4</span></div>
<div class="item"><div class="box" style="width:8px;height:8px"></div><span class="k">2·8</span></div>
<div class="item"><div class="box" style="width:12px;height:12px"></div><span class="k">3·12</span></div>
<div class="item"><div class="box" style="width:16px;height:16px"></div><span class="k">4·16</span></div>
<div class="item"><div class="box" style="width:24px;height:24px"></div><span class="k">5·24</span></div>
<div class="item"><div class="box" style="width:32px;height:32px"></div><span class="k">6·32</span></div>
<div class="item"><div class="box" style="width:48px;height:48px"></div><span class="k">7·48</span></div>
<div class="item"><div class="box" style="width:64px;height:64px"></div><span class="k">8·64</span></div>
</div>
</body></html>
