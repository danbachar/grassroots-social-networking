name: grassroots_networking
description: BLE mesh transport layer for GSG protocol. Grassroots protocol.
version: 0.1.0
publish_to: none

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Unified BLE transport (central + peripheral, bondless)
  grassroots_bluetooth_layer:
    git:
      url: git@github.com:danbachar/grassroots-bluetooth-layer.git
      ref: main

  
  # Cryptography (Ed25519 signing, SHA-256 hashing)
  cryptography: ^2.9.0
  
  # Protobuf serialization
  protobuf: ^3.1.0
  
  # Permissions handling
  permission_handler: ^11.0.0
  
  # UUID generation
  uuid: ^4.2.0
  
  # Collection utilities (for bloom filter, queues)
  collection: ^1.18.0
  
  # Logging
  logger: ^2.0.0
  flutter_secure_storage: ^10.0.0
  flutter_local_notifications: ^19.5.0
  shared_preferences: ^2.5.4
  encrypt: ^5.0.3
  pointycastle: ^3.9.1
  
  # State management
  redux: ^5.0.0
  flutter_redux: ^0.10.0
  # Fork of dart_udx, published as grassroots_dart_udx on pub.dev.
  grassroots_dart_udx: ^2.1.0
  http: ^1.6.0
  connectivity_plus: ^7.0.0
  redux_remote_devtools: ^3.0.0

  # Coarse (opt-in) geolocation for diagnostic traces.
  geolocator: ^13.0.0

  # Battery level/state for diagnostic device traces.
  battery_plus: ^6.0.0

  # Pictures: gallery/camera pickers, decode + recompress for BLE bandwidth,
  # and per-app document directory for media files.
  image_picker: ^1.0.7
  image: ^4.1.7
  path_provider: ^2.1.2

  # Native libsodium FFI bindings — used for Ed25519 sign/verify on hot paths
  # (per-fragment crypto when sending/receiving fragmented payloads). Pure-Dart
  # Ed25519 in `cryptography` runs ~150-200ms per verify on Android; libsodium
  # runs the same op in ~5-10ms. Bundles native binaries for iOS / Android /
  # macOS / Windows / Linux.
  sodium_libs: ^3.4.4+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  protoc_plugin: ^21.1.0
  build_runner: ^2.4.0
  mockito: ^5.4.0
  flutter_prunekit: ^2.4.0
  fake_async: ^1.3.0
  sodium: ^3.4.6

flutter:
  uses-material-design: true
  # No assets needed for transport layer
